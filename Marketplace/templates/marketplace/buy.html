{% extends "home/base.html" %}

{% block content %}
<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" id="msg">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
  <h1 class="mb-3">Buy Items</h1>

  <!-- Search/filter bar -->
  <form method="get" class="mb-3 d-flex gap-2">
    <input type="text" name="q" class="form-control" placeholder="Search items...">
    <button class="btn btn-primary" type="submit">Search</button>
  </form>

  <!-- Placeholder for items grid -->
  <p>Item cards will go here (image, title, price, seller, etc.).</p>
</div>

<script>
    setTimeout(function() {
        $('#msg').fadeOut('fast');
    }, 3000);
</script>
{% endblock %}
