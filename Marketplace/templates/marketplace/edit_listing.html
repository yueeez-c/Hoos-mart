{% extends "home/base.html" %}

{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-4">
  <h1>Edit listing: {{ listing.title }}</h1>

  <form method="post" enctype="multipart/form-data" class="mb-3">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mb-3">
        <label for="id_images" class="form-label">Add more photos</label>
        <input
            type="file"
            name="images"
            id="id_images"
            multiple
            class="form-control"
        >
        <div class="form-text">
            You can select multiple photos to add.
        </div>
    </div>

    <button class="btn btn-primary" type="submit">Save changes</button>
    <a href="{% url 'marketplace-sell' %}" class="btn btn-secondary">Back to your listings</a>
  </form>

  <p class="text-muted">
    Current status: <strong>{{ listing.get_status_display }}</strong>
  </p>
</div>
{% endblock %}
