{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <h1>Post a new item</h1>

  <form method="post" enctype="multipart/form-data" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">Post listing</button>
  </form>
</div>
{% endblock %}
