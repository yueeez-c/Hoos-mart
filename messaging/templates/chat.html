{% extends "home/base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Messages</h2>
    <h5 class="text-muted">Chatting with {{ other_user.get_username }}</h5>
  <div id="chat-log" class="border p-3" style="height: 300px; overflow-y: auto;">
      {% for m in messages %}
      <p><b>{{ m.sender.username }}:</b> {{ m.content }}</p>
    {% endfor %}
  </div>

  <div class="input-group mt-3">
    <input id="chat-message-input" type="text" class="form-control" placeholder="Type your message...">
    <button id="chat-message-submit" class="btn btn-primary">Send</button>
  </div>
</div>

<script>
  const protocol = window.location.protocol === "https:" ? "wss" : "ws";
  const otherId = "{{ other_user.id }}";
  const socket = new WebSocket(`${protocol}://${window.location.host}/ws/dm/${otherId}/`);


  socket.onmessage = function(e) {
    const data = JSON.parse(e.data);
    const log = document.getElementById("chat-log");
    const who = data.sender || "User";
    log.innerHTML += `<p><b>${data.sender || 'User'}:</b> ${data.message}</p>`;
    log.scrollTop = log.scrollHeight;
  };

  document.getElementById("chat-message-submit").onclick = function() {
    const input = document.getElementById("chat-message-input");
    const msg = input.value.trim();
    if (!msg) return;
    socket.send(JSON.stringify({ message: msg }));
    input.value = "";
  };
</script>
{% endblock %}
