{% extends "home/base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Messages</h2>
    <h5 class="text-muted">Chatting with {{ other_user.get_username }}</h5>
  <div id="chat-log" class="border p-3" style="height:300px; overflow-y:auto;"> 
    {% include "messaging/chat_messages.html" %} 
  </div>

  <div class="input-group mt-3">
    <input id="chat-message-input" type="text" class="form-control" placeholder="Type your message...">
    <button id="chat-message-submit" class="btn btn-primary">Send</button>
  </div>
</div>

<script>
  const protocol = window.location.protocol === "https:" ? "wss" : "ws";
  const otherId  = "{{ other_user.id }}";
  const me       = "{{ request.user.username|escapejs }}";
  const socket   = new WebSocket(`${protocol}://${window.location.host}/ws/dm/${otherId}/`);

  const log = document.getElementById("chat-log");
  const clearEmpty = () => { const e = document.getElementById("empty-state"); if (e) e.remove(); };
  const appendLine = (who, msg) => {
    clearEmpty();
    log.insertAdjacentHTML("beforeend", `<p><b>${who}:</b> ${msg}</p>`);
    log.scrollTop = log.scrollHeight;
  };

  socket.addEventListener("message", (e) => {
    try {
      const data = JSON.parse(e.data || "{}");
      const who = data.sender === me ? "You" : (data.sender || "User");
      appendLine(who, data.message || "");
    } catch (err) {
      console.error("Bad WS payload:", e.data, err);
    }
  });

  const input  = document.getElementById("chat-message-input");
  const button = document.getElementById("chat-message-submit");

  const sendMsg = () => {
    const msg = (input.value || "").trim();
    if (!msg || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify({ message: msg }));
    input.value = "";
  };

  button.addEventListener("click", sendMsg);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  // keep scrolled to bottom on first paint
  document.addEventListener("DOMContentLoaded", () => { log.scrollTop = log.scrollHeight; });
</script>
{% endblock %}
