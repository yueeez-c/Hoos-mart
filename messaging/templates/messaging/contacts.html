{% extends "home/base.html" %}

{% block content %}
<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" id="msg">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

  <h1 class="mb-3">Contacts</h1>
  <ul class="list-group">
    {% for u in users %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ u.username }}</span>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'messaging:chat' u.id %}">
          Message
        </a>
      </li>
    {% empty %}
      <li class="list-group-item text-muted">No other users yet.</li>
    {% endfor %}
  </ul>
</div>

<script>
    setTimeout(function() {
        $('#msg').fadeOut('fast');
    }, 3000);
</script>
{% endblock %}
