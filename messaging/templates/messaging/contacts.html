{% extends "home/base.html" %}
{% block content %}
<div class="container mt-4">
  <h1 class="mb-3">Contacts</h1>
  <ul class="list-group">
    {% for u in users %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ u.username }}</span>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'messaging:chat' u.id %}">
          Message
        </a>
      </li>
    {% empty %}
      <li class="list-group-item text-muted">No other users yet.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
