{% extends "home/base.html" %}
{% block content %}

<div class="container mt-4">
  <h2>Report {{ other_user.username }}</h2>

  <form method="POST">
    {% csrf_token %}

    <label class="form-label">Why are you reporting this user?</label>
    <textarea name="text" class="form-control" rows="5" required></textarea>

    <button class="btn btn-danger mt-3" type="submit">Submit Report</button>
  </form>
</div>

{% endblock %}
