{% extends "home/base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Start a chat</h2>
  <ul class="list-group">
    {% for u in users %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ u.get_username }}
        <a class="btn btn-sm btn-primary" href="{% url 'messaging:chat' u.id %}">Message</a>
      </li>
    {% empty %}
      <li class="list-group-item">No other users yet.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
