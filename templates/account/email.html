{% extends "home/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="content-section">
    <h3>Verify Your Emails</h3>

    <form method="POST" action="{% url 'account_email' %}">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary mt-2" type="submit" name="action_send">
            Resend verification email
        </button>
        <div class="alert alert-warning" role="alert">

    <h4 class="alert-heading"><i class="bi bi-exclamation-triangle-fill"></i></h4>
    <p>
        Only <strong>@virginia.edu</strong> emails are accepted.
        You will see a message if an email is sent to your address.
    </p>
</div>
    </form>
</div>
{% endblock %}
