{% extends "home/base.html" %}
{% load socialaccount %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center mb-4">Sign In via Google</h2>

    <p class="text-center">
        You are about to sign in using your Google account.
    </p>


    <div class="alert alert-warning text-center" role="alert">
        <strong>Action Required:</strong> Remember to verify your identity in profile using you UVA email before continuing
    </div>

    <div class="d-flex justify-content-center mt-4">
        <form method="post" action="{% provider_login_url 'google' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary btn-lg">
                Continue with Google
            </button>
        </form>
    </div>
</div>
{% endblock %}
