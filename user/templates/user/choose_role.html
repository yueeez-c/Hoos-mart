{% extends "home/base.html" %}
{% block content %}

<div class="container mt-4">
    <h2>Select Account Type</h2>
    <form method="POST">
        {% csrf_token %}

        <label><input type="radio" name="role" value="student"> Student</label><br>
        <label><input type="radio" name="role" value="moderator"> Moderator (requires approval)</label><br>

        <button class="btn btn-primary mt-3" type="submit">Continue</button>
    </form>
</div>

{% endblock %}
